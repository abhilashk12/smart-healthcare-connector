<h2 mat-dialog-title>

    New Authorization Request

</h2>

<mat-dialog-content>

<form [formGroup]="form">

<mat-form-field appearance="outline">

    <mat-label>

        Patient

    </mat-label>

    <mat-select formControlName="patientId">

        <mat-option
            *ngFor="let patient of patients"
            [value]="patient.id">

            {{patient.firstName}} {{patient.lastName}}

        </mat-option>

    </mat-select>

</mat-form-field>

<mat-form-field appearance="outline">

    <mat-label>

        Diagnosis

    </mat-label>

    <input
        matInput
        formControlName="diagnosis">

</mat-form-field>

<mat-form-field appearance="outline">

    <mat-label>

        Procedure Code

    </mat-label>

    <input
        matInput
        formControlName="procedureCode">

</mat-form-field>

<mat-form-field appearance="outline">

    <mat-label>

        Doctor Notes

    </mat-label>

    <textarea
        matInput
        rows="5"
        formControlName="doctorNotes">
    </textarea>

</mat-form-field>

</form>

</mat-dialog-content>

<mat-dialog-actions align="end">

<button
    mat-button
    (click)="close()">

    Cancel

</button>

<button
    mat-raised-button
    color="primary"
    (click)="save()">

    Save Draft

</button>

</mat-dialog-actions>
