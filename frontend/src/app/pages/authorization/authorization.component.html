<div class="header">

    <h2>Authorization Requests</h2>

    <button
        mat-raised-button
        color="primary"
        (click)="openDialog()">

    New Request

</button>

</div>

<table mat-table [dataSource]="requests">

    <ng-container matColumnDef="patientId">

        <th mat-header-cell *matHeaderCellDef>

            Patient-Id

        </th>

        <td mat-cell *matCellDef="let r">

            {{r.patient.firstName}}
            {{r.patient.lastName}} - {{r.patient.id}}

        </td>

    </ng-container>

    <ng-container matColumnDef="diagnosis">

        <th mat-header-cell *matHeaderCellDef>

            Diagnosis

        </th>

        <td mat-cell *matCellDef="let r">

            {{r.diagnosis}}

        </td>

    </ng-container>

    <ng-container matColumnDef="procedure">

        <th mat-header-cell *matHeaderCellDef>

            Procedure

        </th>

        <td mat-cell *matCellDef="let r">

            {{r.procedureCode}}

        </td>

    </ng-container>

    <ng-container matColumnDef="status">

        <th mat-header-cell *matHeaderCellDef>

            Status

        </th>

        <td mat-cell *matCellDef="let r">

            {{r.status}}

        </td>

    </ng-container>

    <ng-container matColumnDef="actions">

        <th mat-header-cell *matHeaderCellDef>

            Actions

        </th>

        <td mat-cell *matCellDef="let r">

            <button mat-button color="primary" (click)="review(r.id!)">

                AI Review

            </button>

            @if (r.status === 'AI_REVIEWED') {
                <button mat-button color="accent" (click)="submit(r.id!)">

                Submit

                </button>
            }

        </td>

    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

</table>
