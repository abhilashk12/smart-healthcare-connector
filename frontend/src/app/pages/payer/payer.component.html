<div class="header">

    <h2>Payer Dashboard</h2>

</div>

<table mat-table [dataSource]="requests" class="mat-elevation-z2">

    <ng-container matColumnDef="patient">

        <th mat-header-cell *matHeaderCellDef>

            Patient

        </th>

        <td mat-cell *matCellDef="let request">

            {{request.patient.firstName}}
            {{request.patient.lastName}}

        </td>

    </ng-container>

    <ng-container matColumnDef="diagnosis">

        <th mat-header-cell *matHeaderCellDef>

            Diagnosis

        </th>

        <td mat-cell *matCellDef="let request">

            {{request.diagnosis}}

        </td>

    </ng-container>

    <ng-container matColumnDef="procedure">

        <th mat-header-cell *matHeaderCellDef>

            Procedure

        </th>

        <td mat-cell *matCellDef="let request">

            {{request.procedureCode}}

        </td>

    </ng-container>

    <ng-container matColumnDef="status">

        <th mat-header-cell *matHeaderCellDef>

            Status

        </th>

        <td mat-cell *matCellDef="let request">

            <span class="status">

                {{request.status}}

            </span>

        </td>

    </ng-container>

    <ng-container matColumnDef="actions">

        <th mat-header-cell *matHeaderCellDef>

            Actions

        </th>

        <td mat-cell *matCellDef="let request">

            <button
                mat-icon-button
                color="primary"
                (click)="approve(request.id!)">

                <mat-icon>

                    check_circle

                </mat-icon>

            </button>

            <button
                mat-icon-button
                color="warn"
                (click)="reject(request.id!)">

                <mat-icon>

                    cancel

                </mat-icon>

            </button>

            <button
                mat-icon-button
                color="accent"
                (click)="needMoreInfo(request.id!)">

                <mat-icon>

                    help

                </mat-icon>

            </button>

        </td>

    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

</table>
